<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense — Visual RON Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a24; color: #ccc; font-family: monospace; display: flex; height: 100vh; }
        #editor-pane { width: 50%; padding: 16px; display: flex; flex-direction: column; }
        #render-pane { width: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #12121a; }
        h2 { color: #88aaff; margin-bottom: 8px; font-size: 14px; }
        #editor-container { flex: 1; display: flex; border: 1px solid #444; border-radius: 4px; overflow: hidden; position: relative; }
        #editor-container.has-error { border-color: #ff4444; }
        #line-numbers {
            width: 44px; padding: 12px 6px 12px 0; text-align: right;
            background: #222; color: #555; font-size: 13px;
            line-height: 1.4; overflow: hidden; user-select: none;
            border-right: 1px solid #333;
        }
        #line-numbers .ln { height: 1.4em; }
        #line-numbers .ln.error { color: #ff4444; font-weight: bold; background: #3a1a1a; }
        textarea { flex: 1; background: #2a2a3a; color: #eee; border: none; padding: 12px; font-family: monospace; font-size: 13px; line-height: 1.4; resize: none; tab-size: 4; }
        textarea:focus { outline: none; }
        #editor-container:focus-within { border-color: #88aaff; }
        #editor-container.has-error:focus-within { border-color: #ff6666; }
        #warnings { margin-top: 8px; padding: 8px; background: #2a2a1a; border: 1px solid #664400; border-radius: 4px; font-size: 12px; color: #ffaa44; min-height: 40px; max-height: 100px; overflow-y: auto; }
        #warnings:empty::before { content: "No warnings"; color: #555; }
        #warnings .warn-line { padding: 2px 0; }
        #warnings .warn-line.is-error { color: #ff4444; }
        #warnings .warn-line.clickable { cursor: pointer; text-decoration: underline; text-decoration-color: #664400; }
        #warnings .warn-line.clickable:hover { text-decoration-color: currentColor; }
        canvas { border: 1px solid #333; border-radius: 4px; max-width: 100%; touch-action: none; }
        .controls { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        button { background: #3a3a5a; color: #ccc; border: 1px solid #555; padding: 6px 16px; cursor: pointer; border-radius: 4px; font-family: monospace; font-size: 12px; }
        button:hover { background: #4a4a6a; }
        select { background: #2a2a3a; color: #eee; border: 1px solid #555; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 12px; }
        select:focus { outline: none; border-color: #88aaff; }
        #time-display { color: #88aaff; font-size: 12px; margin-top: 4px; }
        #status { color: #aaa; font-size: 12px; margin-top: 4px; }
        .selector-row { margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
        .section-label { color: #666; font-size: 11px; min-width: 60px; }
        .shortcuts { font-size: 11px; color: #444; margin-top: 4px; }
        .render-controls { margin-top: 8px; display: flex; gap: 8px; align-items: center; }
        /* ── Mobile responsive ─────────────────────────────────────── */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; height: auto; min-height: 100vh; }
            #editor-pane { width: 100%; padding: 8px; min-height: 40vh; }
            #render-pane { width: 100%; padding: 8px; min-height: 45vh; }
            canvas { width: 100%; height: auto; }
            .selector-row { flex-wrap: wrap; }
            .shortcuts { display: none; }
            h2 { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div id="editor-pane">
        <h2>Visual RON Editor</h2>
        <div class="selector-row">
            <span class="section-label">File:</span>
            <select id="file-select"></select>
            <button id="btn-load">Load File...</button>
            <input type="file" id="file-input" accept=".ron" style="display:none">
        </div>
        <div class="selector-row">
            <span class="section-label">Visual ID:</span>
            <select id="id-select"></select>
        </div>
        <div id="editor-container">
            <div id="line-numbers"></div>
            <textarea id="ron-input" spellcheck="false"></textarea>
        </div>
        <div id="warnings"></div>
        <div class="controls">
            <button id="btn-compile">Compile (Ctrl+Enter)</button>
            <button id="btn-save">Save RON (Ctrl+S)</button>
            <button id="btn-reset-cam">Reset Camera</button>
        </div>
        <div class="shortcuts">Ctrl+Enter = compile | Ctrl+S = save | Scroll/pinch = zoom | Drag = pan | Dbl-click = reset camera</div>
    </div>
    <div id="render-pane">
        <canvas id="gpu" width="600" height="600"></canvas>
        <div id="time-display">t = 0.000s</div>
        <div id="status">Loading...</div>
    </div>

    <script type="module">
        import init, { VisualPreview } from './pkg/towers.js';

        // ── Application state ───────────────────────────────────────

        const FILES = {};  // filename → RON text
        let preview = null;
        let startTime = performance.now();
        let compileTimer = null;

        const textarea = document.getElementById('ron-input');
        const canvas = document.getElementById('gpu');
        const warningsEl = document.getElementById('warnings');
        const timeDisplay = document.getElementById('time-display');
        const statusEl = document.getElementById('status');
        const fileSelect = document.getElementById('file-select');
        const idSelect = document.getElementById('id-select');
        const lineNumsEl = document.getElementById('line-numbers');
        const editorContainer = document.getElementById('editor-container');

        const FALLBACK_RON = `// Example: a simple animated visual
// Load a .ron file or edit this directly, then press Ctrl+Enter
Visual(
    id: "example:demo",
    visual: [
        // Pulsing circle
        Circle(radius: 20.0, fill: "#ff4444",
            scale: Loop(period: 1.0, keys: [(0.0, 0.8), (0.5, 1.2), (1.0, 0.8)])),

        // Orbiting dot
        Circle(radius: 5.0, fill: "#44aaff",
            offset_x: Loop(period: 2.0, keys: [(0.0, -30.0), (0.5, 0.0), (1.0, 30.0), (1.5, 0.0), (2.0, -30.0)]),
            offset_y: Loop(period: 2.0, keys: [(0.0, 0.0), (0.5, 30.0), (1.0, 0.0), (1.5, -30.0), (2.0, 0.0)])),
    ],
)`;

        // ── Utility ─────────────────────────────────────────────────

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Parse "RON parse error: 5:12: Expected comma" → { line, col, message }
        function parseErrorLocation(errorStr) {
            const match = errorStr.match(/(\d+):(\d+):\s*(.*)/);
            if (match) {
                return { line: parseInt(match[1]), col: parseInt(match[2]), message: match[3] };
            }
            return null;
        }

        // ── Line numbers ────────────────────────────────────────────

        let errorLine = -1; // 1-based, -1 = none

        function updateLineNumbers() {
            const lines = textarea.value.split('\n').length;
            let html = '';
            for (let i = 1; i <= lines; i++) {
                const cls = (i === errorLine) ? 'ln error' : 'ln';
                html += `<div class="${cls}">${i}</div>`;
            }
            lineNumsEl.innerHTML = html;
        }

        textarea.addEventListener('scroll', () => {
            lineNumsEl.scrollTop = textarea.scrollTop;
        });

        textarea.addEventListener('input', () => {
            updateLineNumbers();
            // Debounced auto-compile
            clearTimeout(compileTimer);
            compileTimer = setTimeout(refreshIds, 500);
        });

        // ── Go to error location ────────────────────────────────────

        function goToError(line, col) {
            const lines = textarea.value.split('\n');
            let charIndex = 0;
            for (let i = 0; i < Math.min(line - 1, lines.length); i++) {
                charIndex += lines[i].length + 1;
            }
            charIndex += Math.min(col - 1, (lines[line - 1] || '').length);

            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = charIndex;

            // Scroll to put error line roughly in view
            const lineHeight = parseFloat(getComputedStyle(textarea).lineHeight) || 18;
            textarea.scrollTop = Math.max(0, (line - 5) * lineHeight);
        }

        // ── Warning/error rendering ─────────────────────────────────

        function clearErrorState() {
            errorLine = -1;
            editorContainer.classList.remove('has-error');
            updateLineNumbers();
        }

        function renderWarnings(warningsJson) {
            let parsed;
            try { parsed = JSON.parse(warningsJson); } catch { parsed = [warningsJson]; }

            clearErrorState();

            if (!parsed || parsed.length === 0) {
                warningsEl.innerHTML = '';
                return;
            }

            const fragments = [];
            let foundError = false;

            for (const w of parsed) {
                const isError = /^(RON parse error|Materialize error|No Visual)/i.test(w);
                const errInfo = parseErrorLocation(w);

                if (isError && !foundError) {
                    foundError = true;
                    editorContainer.classList.add('has-error');
                }

                if (errInfo) {
                    if (!foundError || errorLine === -1) {
                        errorLine = errInfo.line;
                        foundError = true;
                        editorContainer.classList.add('has-error');
                    }
                    fragments.push(
                        `<div class="warn-line is-error clickable" data-line="${errInfo.line}" data-col="${errInfo.col}">` +
                        `<strong>Line ${errInfo.line}, Col ${errInfo.col}:</strong> ${escapeHtml(errInfo.message)}</div>`
                    );
                } else {
                    const cls = isError ? 'warn-line is-error' : 'warn-line';
                    fragments.push(`<div class="${cls}">${escapeHtml(w)}</div>`);
                }
            }

            warningsEl.innerHTML = fragments.join('');
            updateLineNumbers();

            // Make clickable errors jump to location
            warningsEl.querySelectorAll('.clickable').forEach(el => {
                el.addEventListener('click', () => {
                    goToError(parseInt(el.dataset.line), parseInt(el.dataset.col));
                });
            });
        }

        // ── File selection ────────────────────────────────────────

        function onFileChange() {
            const filename = fileSelect.value;
            if (!filename || !FILES[filename]) return;
            textarea.value = FILES[filename];
            updateLineNumbers();
            refreshIds();
        }

        function refreshIds() {
            if (!preview) return;
            const text = textarea.value;
            const prevId = idSelect.value;

            // Get available visual IDs from Rust (now returns {ids, errors})
            let ids = [];
            let parseErrors = [];
            try {
                const result = JSON.parse(preview.list_visuals(text));
                ids = result.ids || [];
                parseErrors = result.errors || [];
            } catch (e) {
                parseErrors = ['' + e];
            }

            // Show parse errors immediately in warnings panel
            if (parseErrors.length > 0) {
                renderWarnings(JSON.stringify(parseErrors));
            }

            // Populate ID dropdown
            idSelect.innerHTML = '';
            if (ids.length === 0) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = parseErrors.length > 0
                    ? '(parse error — see warnings)'
                    : '(no Visual definitions found — add Visual(id: "...", visual: [...]))';
                opt.disabled = true;
                idSelect.appendChild(opt);
            }
            for (const id of ids) {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = id;
                idSelect.appendChild(opt);
            }

            // Preserve previous selection if still valid
            if (ids.includes(prevId)) {
                idSelect.value = prevId;
            }

            compileSelected();
        }

        function compileSelected() {
            if (!preview) return;
            const text = textarea.value;
            const selectedId = idSelect.value;

            let warnings;
            try {
                if (selectedId) {
                    warnings = preview.update_by_id(text, selectedId);
                } else {
                    warnings = preview.update(text);
                }
            } catch (e) {
                renderWarnings(JSON.stringify(['' + e]));
                return;
            }

            renderWarnings(warnings);
        }

        // ── Main init ─────────────────────────────────────────────

        async function main() {
            // Init Wasm
            try {
                await init();
            } catch (e) {
                statusEl.textContent = 'Failed to load Wasm module: ' + e;
                statusEl.style.color = '#ff4444';
                return;
            }

            // Auto-discover RON files from manifest
            let failedFiles = [];
            try {
                const resp = await fetch('demo_scenarios/manifest.json?v=' + Date.now());
                if (resp.ok) {
                    const ronFiles = await resp.json();
                    await Promise.all(ronFiles.map(async (filename) => {
                        try {
                            const r = await fetch('demo_scenarios/' + filename + '?v=' + Date.now());
                            if (r.ok) FILES[filename] = await r.text();
                            else failedFiles.push(filename);
                        } catch (e) {
                            failedFiles.push(filename);
                        }
                    }));
                }
            } catch (e) {
                // Manifest not available — not an error for local/hosted use
            }

            // Populate file dropdown
            for (const filename of Object.keys(FILES).sort()) {
                const opt = document.createElement('option');
                opt.value = filename;
                opt.textContent = filename.replace('.ron', '').replace(/_/g, ' ');
                fileSelect.appendChild(opt);
            }

            if (failedFiles.length > 0) {
                statusEl.textContent = `Warning: ${failedFiles.length} file(s) failed to load: ${failedFiles.join(', ')}`;
                statusEl.style.color = '#ffaa44';
            }

            // Init WebGPU / WebGL2 fallback
            const hasWebGPU = !!navigator.gpu;
            try {
                preview = await new VisualPreview(canvas, hasWebGPU);
                const backend = hasWebGPU ? 'WebGPU' : 'WebGL2 (fallback)';
                statusEl.textContent = `${backend} initialized — SDF pipeline active`;
                statusEl.style.color = '#aaa';
            } catch (e) {
                statusEl.textContent = 'GPU init failed: ' + e + '. Use Chrome 113+, Edge 113+, or Firefox Nightly (with dom.webgpu.enabled).';
                statusEl.style.color = '#ff4444';
                return;
            }

            // Load first file, or show fallback example
            if (fileSelect.options.length > 0) {
                fileSelect.selectedIndex = 0;
                onFileChange();
            } else {
                textarea.value = FALLBACK_RON;
                updateLineNumbers();
                statusEl.textContent = 'WebGPU initialized — no demo files found, showing example. Use "Load File..." to open a .ron file.';
                refreshIds();
            }

            requestAnimationFrame(renderLoop);
        }

        function renderLoop(timestamp) {
            const t = (timestamp - startTime) / 1000.0;
            timeDisplay.textContent = `t = ${t.toFixed(3)}s`;
            try {
                if (preview) preview.render_frame(t);
            } catch (e) {
                statusEl.textContent = 'Render error: ' + e;
                statusEl.style.color = '#ff4444';
                return; // stop loop on fatal GPU errors
            }
            requestAnimationFrame(renderLoop);
        }

        // ── Catch unhandled Wasm panics ──────────────────────────

        window.addEventListener('unhandledrejection', (e) => {
            statusEl.textContent = 'Internal error: ' + (e.reason || 'unknown');
            statusEl.style.color = '#ff4444';
        });

        // ── Event handlers ────────────────────────────────────────

        fileSelect.addEventListener('change', onFileChange);
        idSelect.addEventListener('change', compileSelected);
        document.getElementById('btn-compile').addEventListener('click', refreshIds);

        function saveRon() {
            const defaultName = fileSelect.value || 'visual.ron';
            const filename = prompt('Save as:', defaultName);
            if (!filename) return;
            const text = textarea.value;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename.endsWith('.ron') ? filename : filename + '.ron';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        document.getElementById('btn-save').addEventListener('click', saveRon);

        document.getElementById('btn-reset-cam').addEventListener('click', () => {
            if (preview) preview.reset_camera();
        });

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveRon();
            }
        });

        textarea.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                refreshIds();
            }
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = textarea.selectionStart;
                textarea.value = textarea.value.substring(0, start) + '    ' + textarea.value.substring(textarea.selectionEnd);
                textarea.selectionStart = textarea.selectionEnd = start + 4;
                updateLineNumbers();
            }
        });

        // ── Load File button ──────────────────────────────────────

        document.getElementById('btn-load').addEventListener('click', () => {
            document.getElementById('file-input').click();
        });

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                const name = file.name;
                FILES[name] = reader.result;

                // Add to dropdown if not already there
                if (![...fileSelect.options].some(o => o.value === name)) {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name.replace('.ron', '').replace(/_/g, ' ');
                    fileSelect.appendChild(opt);
                }

                fileSelect.value = name;
                onFileChange();
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        // ── Pan & Zoom ──────────────────────────────────────────

        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (!preview) return;
            const factor = e.deltaY < 0 ? 1.15 : 0.87;
            const rect = canvas.getBoundingClientRect();
            const sx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const sy = (e.clientY - rect.top) * (canvas.height / rect.height);
            preview.zoom_at(factor, sx, sy);
        }, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            canvas.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging || !preview) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const dx = -(e.clientX - lastMouseX) * scaleX;
            const dy = -(e.clientY - lastMouseY) * scaleY;
            preview.pan(dx, dy);
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });

        canvas.addEventListener('dblclick', () => {
            if (preview) preview.reset_camera();
        });

        canvas.style.cursor = 'grab';

        // ── Pan & Zoom (touch) ──────────────────────────────────
        let lastTouchX = 0;
        let lastTouchY = 0;
        let lastPinchDist = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastPinchDist = Math.hypot(dx, dy);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!preview) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            if (e.touches.length === 1) {
                const dx = -(e.touches[0].clientX - lastTouchX) * scaleX;
                const dy = -(e.touches[0].clientY - lastTouchY) * scaleY;
                preview.pan(dx, dy);
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.hypot(dx, dy);
                if (lastPinchDist > 0) {
                    const factor = dist / lastPinchDist;
                    const cx = ((e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left) * scaleX;
                    const cy = ((e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top) * scaleY;
                    preview.zoom_at(factor, cx, cy);
                }
                lastPinchDist = dist;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) lastPinchDist = 0;
        });

        // ── Dynamic canvas resize ───────────────────────────────
        function resizeCanvas() {
            if (window.innerWidth <= 768) {
                const size = Math.min(window.innerWidth - 16, 600);
                canvas.width = size;
                canvas.height = size;
            } else {
                canvas.width = 600;
                canvas.height = 600;
            }
            if (preview) preview.resize(canvas.width, canvas.height);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ── Initialize line numbers and launch ──────────────────

        updateLineNumbers();
        main();
    </script>
</body>
</html>
